<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="main.js"></script>
    <title>Movie Diary Project</title>
  </head>
  <body class="mx-5">
    <nav class="flex justify-between navbar bg-base-100 shadow-sm">
      <div class="pl-5">
        <svg
          width="30"
          height="30"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
          fill-rule="evenodd"
          clip-rule="evenodd"
          class="fill-current"
        >
          <path
            d="M22.672 15.226l-2.432.811.841 2.515c.33 1.019-.209 2.127-1.23 2.456-1.15.325-2.148-.321-2.463-1.226l-.84-2.518-5.013 1.677.84 2.517c.391 1.203-.434 2.542-1.831 2.542-.88 0-1.601-.564-1.86-1.314l-.842-2.516-2.431.809c-1.135.328-2.145-.317-2.463-1.229-.329-1.018.211-2.127 1.231-2.456l2.432-.809-1.621-4.823-2.432.808c-1.355.384-2.558-.59-2.558-1.839 0-.817.509-1.582 1.327-1.846l2.433-.809-.842-2.515c-.33-1.02.211-2.129 1.232-2.458 1.02-.329 2.13.209 2.461 1.229l.842 2.515 5.011-1.677-.839-2.517c-.403-1.238.484-2.553 1.843-2.553.819 0 1.585.509 1.85 1.326l.841 2.517 2.431-.81c1.02-.33 2.131.211 2.461 1.229.332 1.018-.21 2.126-1.23 2.456l-2.433.809 1.622 4.823 2.433-.809c1.242-.401 2.557.484 2.557 1.838 0 .819-.51 1.583-1.328 1.847m-8.992-6.428l-5.01 1.675 1.619 4.828 5.011-1.674-1.62-4.829z"
          ></path>
        </svg>
      </div>
      <div>
        <ul class="flex justify-between">
          <li><a class="btn btn-ghost text-xl" href="#">Home</a></li>
          <li><a class="btn btn-ghost text-xl" href="#">Journal</a></li>
        </ul>
      </div>
    </nav>
    <!-- Header -->
    <header class="flex flex-col justify-center text-center h-48 bg-purple-100">
      <h1 class="text-3xl font-semibold mb-5">Movie Dairy</h1>
      <form class="flex justify-center" action="">
        <input
          class="w-6/12 rounded-l-md shadow-lg border-gray-300 h-10 px-4"
          id="search"
          type="text"
          placeholder="search movies..."
        />
        <button
          type="submit"
          class="btn bg-purple-900 text-white font-semibold rounded-r-md"
        >
          Search
        </button>
      </form>
    </header>

    <!-- Main -->
    <main class="flex justify-between mt-5 mb-5 gap-4">
      <!-- Movie Section -->
      <section
        class="flex flex-col justify-between bg-purple-200 rounded-xl w-screen gap-4 p-5"
      >
        <div>
          <h1 class="font-semibold text-3xl">Movies</h1>
        </div>

        <!-- CARDS -->
        <div class="flex justify-start flex-wrap gap-5">
          <!-- Card 1-->
          <div class="card bg-base-100 w-60 shadow-sm">
            <figure class="px-3 pt-3">
              <img
                src="https://img.daisyui.com/images/stock/photo-1606107557195-0e29a4b5b4aa.webp"
                alt="Shoes"
                class="rounded-xl"
              />
            </figure>
            <div class="card-body items-center text-center">
              <h2 class="card-title">Card Title</h2>
              <p>
                A card component has a figure, a body part, and inside body
                there are title and actions parts
              </p>
              <div class="card-actions">
                <button id="addToFavourite" class="btn btn-primary">
                  Add to favourite
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Favourite Section -->
      <section class="bg-pink-800 w-130 p-5 space-y-4 bg-purple-300 rounded-xl">
        <h1 class="font-semibold text-3xl">favourite movies</h1>
        <div class="flex bg-base-100 w-70 md:w-auto rounded-2xl shadow-sm pb-2">
          <figure class="px-3 pt-3">
            <img
              class="w-20 h-15 rounded-xl"
              src="https://img.daisyui.com/images/stock/photo-1606107557195-0e29a4b5b4aa.webp"
              alt="Shoes"
              class="rounded-xl"
            />
          </figure>
          <div class="felx flex-col justify-between">
            <h2 class="font-bold mt-1">Movie Name</h2>
            <div class="">
              <button
                id="removeMovie"
                class="border border-purple-200 px-2 rounded-lg text-purple-600 hover:border-transparent hover:bg-purple-600 hover:text-white active:bg-purple-700 mt-3"
              >
                Remove
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer
      class="footer sm:footer-horizontal footer-center bg-base-300 text-base-content p-4"
    >
      <aside>
        <p id="copyright"></p>
      </aside>
    </footer>
  </body>
</html>
